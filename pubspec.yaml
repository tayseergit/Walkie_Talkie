name: comunicate
description: "Local-network offline walkie-talkie app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  # Networking & local IP
  network_info_plus: ^7.0.0

  # WebRTC P2P audio
  flutter_webrtc: ^1.4.1
  audio_session: ^0.1.21

  # WebSocket server (host) + client
  shelf: ^1.4.2
  shelf_web_socket: ^2.0.0
  web_socket_channel: ^3.0.1

  # QR code display + scanning
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.0.0

  # Permissions
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
